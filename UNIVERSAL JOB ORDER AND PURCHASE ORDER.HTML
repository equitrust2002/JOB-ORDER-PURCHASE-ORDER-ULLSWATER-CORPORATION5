<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ULLSWATER | UNIVERSAL MIRROR SYSTEM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* BASE STYLING */
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        .form-container { max-width: 1000px; background: white; margin: auto; padding: 40px; border: 1px solid #000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* HEADER & BRANDING */
        .header { display: flex; justify-content: space-between; border-bottom: 3px solid #1a2a3a; padding-bottom: 15px; margin-bottom: 20px; align-items: flex-start; }
        #corpName { font-weight: 800; font-size: 26px; border: none; color: #1a2a3a; text-transform: uppercase; width: 100%; outline: none; }
        #formType { font-size: 18px; font-weight: 700; border: none; color: #c0392b; background: transparent; cursor: pointer; outline: none; appearance: none; }
        
        /* VIVID QR CODE */
        #qrcode-container { text-align: center; border: 2px solid #000; padding: 10px; background: #fff; min-width: 180px; display: flex; flex-direction: column; align-items: center; }
        .qr-label { font-size: 11px; font-weight: bold; margin-top: 8px; text-transform: uppercase; color: #000; }

        /* TABLES */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 10px; font-size: 13px; word-wrap: break-word; vertical-align: middle; }
        .bg-blue { background-color: #1a2a3a !important; color: white !important; font-weight: bold; -webkit-print-color-adjust: exact; }
        .bg-grey { background-color: #f2f2f2 !important; font-weight: bold; -webkit-print-color-adjust: exact; }
        
        input, select, textarea { width: 100%; border: none; font-family: inherit; font-size: 13px; background: transparent; outline: none; }
        textarea { resize: none; overflow: hidden; display: block; line-height: 1.4; }

        /* SIGNATURES */
        .footer-section { margin-top: 40px; }
        .signature-wrapper { display: flex; justify-content: space-between; margin-top: 50px; }
        .sig-box { width: 30%; text-align: center; }
        .sig-line { border-top: 1.5px solid #000; margin-bottom: 8px; }
        .sig-label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #1a2a3a; }

        /* BUTTONS */
        .no-print { text-align: center; margin-top: 30px; padding: 20px; background: #ddd; border-radius: 8px; }
        button { padding: 10px 18px; cursor: pointer; border: none; margin: 4px; color: white; font-weight: bold; border-radius: 4px; }

        @media print {
            @page { size: portrait; margin: 12mm; }
            body { background: white; padding: 0; }
            .form-container { border: none; box-shadow: none; width: 100% !important; max-width: 100%; padding: 0; }
            .no-print, .action-col, button { display: none !important; }
            textarea { height: auto !important; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <div style="flex-grow: 1;">
            <input type="text" id="corpName" value="ULLSWATER CORPORATION" oninput="saveData()">
            <div style="margin: 5px 0;">
                <select id="formType" onchange="updateMode(); generateID(); saveData()">
                    <option value="JOB ORDER">JOB ORDER FORM</option>
                    <option value="PURCHASE ORDER">PURCHASE ORDER FORM</option>
                </select>
            </div>
            <div style="margin-top: 10px; font-weight: bold;">
                <span id="idLabel">JO NO</span>: 
                <input type="text" id="docNo" style="font-weight: bold; width: 250px; border-bottom: 1px solid #000;" oninput="saveData()">
            </div>
        </div>
        <div id="qrcode-container">
            <div id="qrcode"></div>
            <div class="qr-label">FULL MIRROR SCAN</div>
        </div>
    </div>

    <table>
        <tr>
            <td width="50%"><strong>DATE ISSUED:</strong> <input type="date" id="docDate" oninput="saveData()"></td>
            <td width="50%"><strong><span id="refLabel">UNIT NO</span>:</strong> <input type="text" id="refNo" oninput="saveData()"></td>
        </tr>
        <tr>
            <td colspan="2">
                <strong id="descLabel">PROBLEM:</strong>
                <textarea id="description" oninput="autoExpand(this); saveData()" style="width: 100%; margin-top: 8px; min-height: 40px;"></textarea>
            </td>
        </tr>
    </table>

    <table id="mainTable">
        <thead>
            <tr class="bg-blue">
                <th width="20%">SOURCE</th>
                <th width="35%">DESCRIPTION</th>
                <th width="8%">QTY</th>
                <th width="8%">UOM</th>
                <th width="12%">PRICE</th>
                <th width="12%">TOTAL</th>
                <th class="action-col" width="5%"></th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot>
            <tr class="bg-grey">
                <td colspan="5" style="text-align: right; padding-right: 20px;">GRAND TOTAL:</td>
                <td id="grandTotal">0.00</td>
                <td class="action-col"></td>
            </tr>
        </tfoot>
    </table>
    
    <button style="background: #34495e; width: 100%; margin-top: 10px;" onclick="addRow()" class="no-print">+ ADD ITEM ROW</button>

    <div class="footer-section">
        <div class="signature-wrapper">
            <div class="sig-box"><div class="sig-line"></div><div class="sig-label">Requested By</div></div>
            <div class="sig-box"><div class="sig-line"></div><div id="sigMiddle" class="sig-label">Performed By</div></div>
            <div class="sig-box"><div class="sig-line"></div><div class="sig-label">Verified By</div></div>
        </div>
    </div>

    <div class="no-print">
        <button style="background: #2980b9;" onclick="window.print()">PRINT / PDF</button>
        <button style="background: #e67e22;" onclick="exportExactCSV()">EXPORT CSV (ALL DETAILS)</button>
        <button style="background: #27ae60;" onclick="document.getElementById('bulkInput').click()">BULK LOAD JSON</button>
        <button style="background: #c0392b;" onclick="clearForm()">RESET</button>
        <input type="file" id="bulkInput" style="display:none" multiple onchange="loadBulk(event)">
    </div>
</div>

<script>
    let qrTimeout;

    function generateID() {
        const type = document.getElementById('formType').value;
        const prefix = (type === "PURCHASE ORDER") ? "PO" : "JO";
        const datePart = new Date().toISOString().slice(2,10).replace(/-/g, '');
        const randomPart = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('docNo').value = `${prefix}-${datePart}-${randomPart}`;
    }

    function updateMode() {
        const type = document.getElementById('formType').value;
        const isPO = (type === "PURCHASE ORDER");
        document.getElementById('idLabel').innerText = isPO ? "PO NO" : "JO NO";
        document.getElementById('refLabel').innerText = isPO ? "VENDOR" : "UNIT NO";
        document.getElementById('descLabel').innerText = isPO ? "REMARKS:" : "PROBLEM:";
        document.getElementById('sigMiddle').innerText = isPO ? "Approved By" : "Performed By";
    }

    function autoExpand(el) { 
        if (!el) return;
        el.style.height = 'auto'; 
        el.style.height = (el.scrollHeight) + 'px'; 
    }

    function calculateTotals() {
        let grandTotal = 0;
        document.querySelectorAll('#tableBody tr').forEach(tr => {
            const qty = parseFloat(tr.querySelector('.qty').value) || 0;
            const price = parseFloat(tr.querySelector('.price').value) || 0;
            const rowTotal = qty * price;
            tr.querySelector('.rowTotal').innerText = rowTotal.toFixed(2);
            grandTotal += rowTotal;
        });
        document.getElementById('grandTotal').innerText = grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    function addRow(src="", d="", q="", u="", p="") {
        const tbody = document.getElementById('tableBody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><textarea class="src" oninput="autoExpand(this); saveData()">${src}</textarea></td>
            <td><textarea class="desc" oninput="autoExpand(this); saveData()">${d}</textarea></td>
            <td><input type="number" class="qty" value="${q}" oninput="calculateTotals(); saveData()"></td>
            <td><input type="text" class="uom" value="${u}" oninput="saveData()"></td>
            <td><input type="number" step="0.01" class="price" value="${p}" oninput="calculateTotals(); saveData()"></td>
            <td class="rowTotal" style="font-weight:bold;">0.00</td>
            <td class="action-col"><button style="background:#c0392b; color:white;" onclick="this.parentElement.parentElement.remove(); calculateTotals(); saveData()">✕</button></td>
        `;
        tbody.appendChild(tr);
        autoExpand(tr.querySelector('.src'));
        autoExpand(tr.querySelector('.desc'));
        calculateTotals();
    }

    function updateQRCode() {
        clearTimeout(qrTimeout);
        qrTimeout = setTimeout(() => {
            const corp = document.getElementById('corpName').value;
            const type = document.getElementById('formType').value;
            const docNo = document.getElementById('docNo').value || "N/A";
            const date = document.getElementById('docDate').value || "N/A";
            const total = document.getElementById('grandTotal').innerText;

            let mirrorStr = `[ULLSWATER MIRROR]\n${corp}|${type}\nNO:${docNo}|DT:${date}\n`;
            document.querySelectorAll('#tableBody tr').forEach((r) => {
                const src = r.querySelector('.src').value.substring(0,10);
                const desc = r.querySelector('.desc').value.substring(0,20);
                const q = r.querySelector('.qty').value;
                const p = r.querySelector('.price').value;
                if(desc) mirrorStr += `${src}|${desc}|${q}|${p}\n`;
            });
            mirrorStr += `TOTAL:${total}`;
            
            const qrDiv = document.getElementById("qrcode");
            qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: mirrorStr, width: 180, height: 180, correctLevel: QRCode.CorrectLevel.L });
        }, 600);
    }

    function exportExactCSV() {
        const corp = document.getElementById('corpName').value;
        const type = document.getElementById('formType').value;
        const docNo = document.getElementById('docNo').value;
        const date = document.getElementById('docDate').value;
        const refLabel = document.getElementById('refLabel').innerText;
        const refNo = document.getElementById('refNo').value;
        const descLabel = document.getElementById('descLabel').innerText;
        const problem = document.getElementById('description').value.replace(/\n/g, " ");

        let csv = [];
        // Header Info
        csv.push(`COMPANY,${corp}`);
        csv.push(`FORM TYPE,${type}`);
        csv.push(`DOCUMENT NO,${docNo}`);
        csv.push(`DATE ISSUED,${date}`);
        csv.push(`${refLabel},${refNo}`);
        csv.push(`${descLabel},${problem}`);
        csv.push(""); // Spacer
        
        // Item Table
        csv.push("SOURCE,DESCRIPTION,QTY,UOM,PRICE,TOTAL");
        
        document.querySelectorAll('#tableBody tr').forEach(r => {
            const src = r.querySelector('.src').value.replace(/\n/g, " ");
            const desc = r.querySelector('.desc').value.replace(/\n/g, " ");
            const qty = r.querySelector('.qty').value;
            const uom = r.querySelector('.uom').value;
            const price = r.querySelector('.price').value;
            const total = r.querySelector('.rowTotal').innerText;
            csv.push(`"${src}","${desc}","${qty}","${uom}","${price}","${total}"`);
        });

        csv.push(`,,,,GRAND TOTAL,${document.getElementById('grandTotal').innerText}`);

        const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${docNo}_FULL_MIRROR.csv`;
        a.click();
    }

    function saveData() {
        const data = {
            corp: document.getElementById('corpName').value,
            type: document.getElementById('formType').value,
            docNo: document.getElementById('docNo').value,
            date: document.getElementById('docDate').value,
            refNo: document.getElementById('refNo').value,
            desc: document.getElementById('description').value,
            items: Array.from(document.querySelectorAll('#tableBody tr')).map(r => {
                return { 
                    src: r.querySelector('.src').value, 
                    d: r.querySelector('.desc').value, 
                    q: r.querySelector('.qty').value, 
                    u: r.querySelector('.uom').value, 
                    p: r.querySelector('.price').value 
                };
            })
        };
        localStorage.setItem('ULLSWATER_SYSTEM', JSON.stringify(data));
        updateQRCode();
    }

    async function loadBulk(e) {
        for (const file of e.target.files) {
            try {
                const data = JSON.parse(await file.text());
                const fileDate = data.date || "N/A";
                if(data.items) {
                    data.items.forEach(item => {
                        const dateSource = `[${fileDate}] ${item.src || file.name}`;
                        addRow(dateSource, item.d, item.q, item.u, item.p);
                    });
                }
            } catch(err) { console.error("Error", file.name); }
        }
        saveData();
    }

    function clearForm() {
        if(confirm("Confirm: Clear entire form?")) {
            localStorage.removeItem('ULLSWATER_SYSTEM');
            location.reload();
        }
    }

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('ULLSWATER_SYSTEM'));
        if(saved) {
            document.getElementById('corpName').value = saved.corp;
            document.getElementById('formType').value = saved.type;
            document.getElementById('docNo').value = saved.docNo;
            document.getElementById('docDate').value = saved.date;
            document.getElementById('refNo').value = saved.refNo;
            document.getElementById('description').value = saved.desc || "";
            if(saved.items) saved.items.forEach(item => addRow(item.src, item.d, item.q, item.u, item.p));
        } else {
            generateID();
            document.getElementById('docDate').valueAsDate = new Date();
            addRow();
        }
        updateMode();
        updateQRCode();
    };
</script>
</body>
</html>
